<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Invitation</title>
<style>
  body {
    margin: 0;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
  }
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .error-card {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
    padding: 40px;
    max-width: 360px;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
  }
  .error-card h2 { color: white; margin: 0; font-size: 18px; }
  .error-card p  { color: #71717a; margin: 0; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

  <!-- Loading state -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p style="color:#52525b;font-size:13px;margin:0;">Opening your invitation...</p>
  </div>

  <!-- Error state -->
  <div class="error-card" id="errorCard">
    <h2>Invalid Invitation</h2>
    <p>This invite link is invalid or has expired. Please contact the event organizer.</p>
  </div>

<script>
const API_URL = "https://entriqs-backend.onrender.com";

async function init() {
  const token = new URLSearchParams(window.location.search).get("token");

  // No token in URL
  if (!token) {
    showError();
    return;
  }

  try {
    const res  = await fetch(`${API_URL}/api/invite/${token}`);
    const data = await res.json();

    if (!res.ok) {
      showError();
      return;
    }

    const template = data.invite.invite_template || "default";

    // Redirect to the right template file
    if (template === "wedding") {
      window.location.href = `invite-wedding.html?token=${token}`;
    } else {
      window.location.href = `invite-default.html?token=${token}`;
    }

  } catch (err) {
    console.error("Router error:", err);
    showError();
  }
}

function showError() {
  document.getElementById("loader").style.display    = "none";
  document.getElementById("errorCard").style.display = "flex";
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
